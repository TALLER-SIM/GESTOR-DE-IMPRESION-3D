<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Soluciones de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="font-black text-lg">Soluciones de Ingeniería</h1>
            <div class="flex space-x-2">
                <button id="btnCotizador" onclick="cambiarPantalla('cotizador')" class="px-3 py-1 rounded bg-blue-600 text-sm font-bold">Cotizar</button>
                <button id="btnInventario" onclick="cambiarPantalla('inventario')" class="px-3 py-1 rounded text-gray-300 hover:bg-slate-800 text-sm font-bold">Inventario</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <section id="pantallaCotizador" class="block bg-white p-6 rounded shadow space-y-4">
            <h2 class="font-bold text-lg border-b pb-2">Cotizador con Margen de Utilidad</h2>
            <select id="selectMaterial" class="w-full border p-2 rounded"></select>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="peso" placeholder="Gramos (g)" class="border p-2 rounded">
                <input type="number" id="tiempo" placeholder="Horas (h)" class="border p-2 rounded">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="merma" value="15" placeholder="Riesgo %" class="border p-2 rounded bg-yellow-50">
                <input type="number" id="utilidad" value="100" placeholder="Utilidad %" class="border p-2 rounded bg-green-50">
            </div>
            <label class="flex items-center text-sm font-bold"><input type="checkbox" id="incluirIva" class="mr-2"> ¿Factura (+16% IVA)?</label>
            <button onclick="calcularCosto()" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Calcular Precio de Venta</button>
            <div id="resultado" class="mt-4 p-4 bg-green-100 rounded text-center hidden">
                <p id="precioVenta" class="text-3xl font-black text-green-800"></p>
            </div>
        </section>

        <section id="pantallaInventario" class="hidden space-y-6">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="font-bold mb-4">Registrar Nuevo Material</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nuevoTipo" placeholder="Tipo (ej. Nylon-CF)" class="border p-2 rounded">
                    <input type="text" id="nuevaMarca" placeholder="Marca (ej. Polymaker)" class="border p-2 rounded">
                    <input type="number" id="nuevoPeso" placeholder="Peso inicial (g)" class="border p-2 rounded">
                    <input type="number" id="nuevoCosto" placeholder="Costo por Kg" class="border p-2 rounded">
                    <button onclick="agregarMaterial()" class="col-span-2 bg-slate-800 text-white font-bold py-2 rounded">Guardar en Inventario</button>
                </div>
            </div>
            <div class="bg-white p-6 rounded shadow">
                <table class="w-full text-left">
                    <thead><tr class="bg-gray-100 text-sm uppercase"><th class="p-2">Material</th><th class="p-2">Marca</th><th class="p-2">Disp. (g)</th><th class="p-2">Acciones</th></tr></thead>
                    <tbody id="tablaInventario"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventarioTaller')) || [];

        function cambiarPantalla(p) {
            document.getElementById('pantallaCotizador').style.display = p === 'cotizador' ? 'block' : 'none';
            document.getElementById('pantallaInventario').style.display = p === 'inventario' ? 'block' : 'none';
            document.getElementById('btnCotizador').className = p === 'cotizador' ? 'px-3 py-1 rounded bg-blue-600' : 'px-3 py-1 rounded text-gray-300';
            document.getElementById('btnInventario').className = p === 'inventario' ? 'px-3 py-1 rounded bg-blue-600' : 'px-3 py-1 rounded text-gray-300';
        }

        function actualizarInterfaz() {
            localStorage.setItem('inventarioTaller', JSON.stringify(inventario));
            const tabla = document.getElementById('tablaInventario');
            const select = document.getElementById('selectMaterial');
            tabla.innerHTML = ''; select.innerHTML = '<option value="">Selecciona Material</option>';
            
            inventario.forEach((mat, i) => {
                tabla.innerHTML += `<tr class="border-b">
                    <td class="p-2 font-bold">${mat.tipo}</td><td class="p-2">${mat.marca}</td>
                    <td class="p-2 text-blue-600 font-black">${mat.peso}g</td>
                    <td class="p-2 space-x-1"><button onclick="descontar(${i})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">- Consumo</button>
                    <button onclick="eliminar(${i})" class="bg-red-500 text-white px-2 py-1 rounded text-xs">X</button></td></tr>`;
                select.innerHTML += `<option value="${mat.costo}">${mat.tipo} (${mat.marca}) - $${mat.costo}/kg</option>`;
            });
        }

        function agregarMaterial() {
            inventario.push({ 
                tipo: document.getElementById('nuevoTipo').value, 
                marca: document.getElementById('nuevaMarca').value, 
                peso: parseFloat(document.getElementById('nuevoPeso').value), 
                costo: parseFloat(document.getElementById('nuevoCosto').value) 
            });
            actualizarInterfaz();
        }

        function descontar(i) {
            const gr = prompt("Gramos consumidos:");
            if(gr) { inventario[i].peso -= parseFloat(gr); actualizarInterfaz(); }
        }

        function eliminar(i) { if(confirm("¿Borrar?")) { inventario.splice(i, 1); actualizarInterfaz(); } }

        function calcularCosto() {
            const mat = inventario[document.getElementById('selectMaterial').selectedIndex - 1];
            if(!mat) return alert("Selecciona material");
            
            const peso = parseFloat(document.getElementById('peso').value);
            const tiempo = parseFloat(document.getElementById('tiempo').value);
            const merma = parseFloat(document.getElementById('merma').value)/100;
            const utilidad = parseFloat(document.getElementById('utilidad').value)/100;
            
            const costoBase = ((peso/1000)*mat.costo) + (tiempo*15) + 50;
            const conRiesgo = costoBase * (1 + merma);
            const precioVenta = conRiesgo * (1 + utilidad);
            const final = document.getElementById('incluirIva').checked ? precioVenta * 1.16 : precioVenta;
            
            document.getElementById('precioVenta').innerText = "$" + Math.ceil(final) + ".00 MXN";
            document.getElementById('resultado').classList.remove('hidden');
        }
        actualizarInterfaz();
    </script>
</body>
</html>
