<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Soluciones de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-black">Soluciones de Ingeniería</h1>
        <div class="space-x-2">
            <button id="btnCotizador" onclick="mostrarSeccion('cotizador')" class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Cotizador</button>
            <button id="btnInventario" onclick="mostrarSeccion('inventario')" class="bg-slate-700 px-4 py-2 rounded text-sm font-bold">Inventario</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <section id="seccionCotizador" class="block bg-white p-6 rounded shadow space-y-4">
            <h2 class="font-bold text-lg border-b pb-2">Cotizador Comercial</h2>
            <select id="selectMaterial" class="w-full border p-2 rounded"></select>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs font-bold text-gray-500">Gramos (g)</label><input type="number" id="peso" class="border p-2 rounded w-full"></div>
                <div><label class="text-xs font-bold text-gray-500">Tiempo (min)</label><input type="number" id="tiempoMin" class="border p-2 rounded w-full"></div>
                <div><label class="text-xs font-bold text-gray-500">Riesgo (%)</label><input type="number" id="merma" value="15" class="border p-2 rounded w-full bg-yellow-50"></div>
                <div><label class="text-xs font-bold text-gray-500">Utilidad (%)</label><input type="number" id="utilidad" value="100" class="border p-2 rounded w-full bg-green-50"></div>
            </div>
            <label class="flex items-center text-sm font-bold"><input type="checkbox" id="incluirIva" class="mr-2"> Factura (+16% IVA)</label>
            <button onclick="calcularCosto()" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Calcular Precio de Venta</button>
            <div id="resultado" class="mt-4 p-4 bg-green-100 rounded text-center hidden"><p id="precioVenta" class="text-3xl font-black text-green-800"></p></div>
        </section>

        <section id="seccionInventario" class="hidden space-y-6">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="font-bold mb-4">Registrar Nuevo Material</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nuevoTipo" placeholder="Tipo" class="border p-2 rounded">
                    <input type="text" id="nuevaMarca" placeholder="Marca" class="border p-2 rounded">
                    <input type="number" id="nuevoPeso" placeholder="Peso (g)" class="border p-2 rounded">
                    <input type="number" id="nuevoCosto" placeholder="Costo/Kg" class="border p-2 rounded">
                    <button onclick="agregarMaterial()" class="col-span-2 bg-slate-800 text-white font-bold py-2 rounded hover:bg-slate-900">Guardar Material</button>
                </div>
            </div>
            <div class="bg-white p-6 rounded shadow overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-xs uppercase"><tr><th class="p-2">Mat.</th><th class="p-2">Marca</th><th class="p-2">Disp.</th><th class="p-2">Acciones</th></tr></thead>
                    <tbody id="tablaInventario"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventarioTaller')) || [];

        function mostrarSeccion(s) {
            document.getElementById('seccionCotizador').style.display = (s === 'cotizador') ? 'block' : 'none';
            document.getElementById('seccionInventario').style.display = (s === 'inventario') ? 'block' : 'none';
            document.getElementById('btnCotizador').className = (s === 'cotizador') ? 'bg-blue-600 px-4 py-2 rounded text-sm font-bold' : 'bg-slate-700 px-4 py-2 rounded text-sm font-bold';
            document.getElementById('btnInventario').className = (s === 'inventario') ? 'bg-blue-600 px-4 py-2 rounded text-sm font-bold' : 'bg-slate-700 px-4 py-2 rounded text-sm font-bold';
        }

        function actualizarUI() {
            localStorage.setItem('inventarioTaller', JSON.stringify(inventario));
            const tabla = document.getElementById('tablaInventario');
            const select = document.getElementById('selectMaterial');
            tabla.innerHTML = ''; 
            select.innerHTML = '<option value="">Selecciona Material</option>';
            
            inventario.forEach((mat, i) => {
                tabla.innerHTML += `<tr class="border-b text-sm">
                    <td class="p-2 font-bold">${mat.tipo}</td>
                    <td class="p-2">${mat.marca}</td>
                    <td class="p-2 font-bold text-blue-600">${mat.peso}g</td>
                    <td class="p-2 flex gap-1">
                        <button onclick="consumo(${i})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">Consumo</button>
                        <button onclick="editar(${i})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">Edit</button>
                        <button onclick="borrar(${i})" class="bg-red-500 text-white px-2 py-1 rounded text-xs">X</button>
                    </td></tr>`;
                select.innerHTML += `<option value="${i}">${mat.tipo} (${mat.marca})</option>`;
            });
        }

        function agregarMaterial() {
            const tipo = document.getElementById('nuevoTipo').value;
            const marca = document.getElementById('nuevaMarca').value;
            const peso = parseFloat(document.getElementById('nuevoPeso').value);
            const costo = parseFloat(document.getElementById('nuevoCosto').value);
            if(tipo && !isNaN(peso) && !isNaN(costo)) {
                inventario.push({ tipo, marca, peso, costo });
                actualizarUI();
            }
        }

        function consumo(i) {
            const gr = prompt("Gramos utilizados:");
            if(gr && !isNaN(gr)) { inventario[i].peso -= parseFloat(gr); actualizarUI(); }
        }

        function editar(i) {
            const m = inventario[i];
            const t = prompt("Nuevo nombre:", m.tipo);
            const mr = prompt("Nueva marca:", m.marca);
            const c = prompt("Nuevo costo por Kg:", m.costo);
            if(t) m.tipo = t; if(mr) m.marca = mr; if(c) m.costo = parseFloat(c);
            actualizarUI();
        }

        function borrar(i) { if(confirm("¿Eliminar?")) { inventario.splice(i, 1); actualizarUI(); } }

        function calcularCosto() {
            const idx = document.getElementById('selectMaterial').value;
            if(idx === "") return alert("Selecciona material");
            const mat = inventario[idx];
            const p = parseFloat(document.getElementById('peso').value);
            const t = parseFloat(document.getElementById('tiempoMin').value);
            const m = parseFloat(document.getElementById('merma').value)/100;
            const u = parseFloat(document.getElementById('utilidad').value)/100;
            
            const base = ((p/1000)*mat.costo) + ((t/60)*15) + 50;
            const fin = (base * (1 + m) * (1 + u)) * (document.getElementById('incluirIva').checked ? 1.16 : 1);
            
            document.getElementById('precioVenta').innerText = "$" + Math.ceil(fin) + ".00 MXN";
            document.getElementById('resultado').classList.remove('hidden');
        }
        
        actualizarUI();
    </script>
</body>
</html>
