<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Soluciones de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
            <div>
                <span class="font-black text-xl">Soluciones de Ingeniería</span>
            </div>
            <div class="flex space-x-2">
                <button id="btnCotizador" onclick="cambiarPantalla('cotizador')" class="px-4 py-2 rounded bg-blue-600 text-sm font-bold">Cotizador</button>
                <button id="btnInventario" onclick="cambiarPantalla('inventario')" class="px-4 py-2 rounded text-gray-300 hover:bg-slate-800 text-sm font-bold">Inventario</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl w-full mx-auto p-4">
        <section id="pantallaCotizador" class="block max-w-lg mx-auto bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">Cotización Comercial</h2>
            <div class="space-y-4">
                <select id="selectMaterial" class="w-full border p-2 rounded"></select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="peso" placeholder="Peso (g)" class="border p-2 rounded w-full">
                    <input type="number" id="tiempo" placeholder="Tiempo (h)" class="border p-2 rounded w-full">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="incluirIva" class="w-5 h-5">
                    <label class="ml-2 font-bold text-sm">¿Incluye Factura (+16% IVA)?</label>
                </div>
                <button onclick="calcularCosto()" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Generar Precio</button>
            </div>
            <div id="resultado" class="mt-6 p-4 bg-green-50 rounded hidden">
                <p id="precioVenta" class="text-2xl font-black text-green-700 text-center"></p>
            </div>
        </section>

        <section id="pantallaInventario" class="hidden">
            <div class="bg-white p-6 rounded shadow mb-6">
                <h2 class="font-bold mb-4">Registrar Nuevo Material</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <input type="text" id="nuevoTipo" placeholder="Tipo (ej. Nylon-CF)" class="border p-2 rounded">
                    <input type="number" id="nuevoPeso" placeholder="Peso inicial (g)" class="border p-2 rounded">
                    <input type="number" id="nuevoCosto" placeholder="Costo por Kg" class="border p-2 rounded">
                    <button onclick="agregarMaterial()" class="bg-slate-800 text-white rounded font-bold">+ Agregar</button>
                </div>
            </div>
            <div class="bg-white p-6 rounded shadow overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="bg-gray-100 text-sm uppercase"><th class="p-3">Material</th><th class="p-3">Disp. (g)</th><th class="p-3">Acciones</th></tr></thead>
                    <tbody id="tablaInventario"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventarioTaller')) || [];

        function cambiarPantalla(pantalla) {
            document.getElementById('pantallaCotizador').style.display = pantalla === 'cotizador' ? 'block' : 'none';
            document.getElementById('pantallaInventario').style.display = pantalla === 'inventario' ? 'block' : 'none';
            document.getElementById('btnCotizador').className = pantalla === 'cotizador' ? 'px-4 py-2 rounded bg-blue-600 text-sm font-bold' : 'px-4 py-2 rounded text-gray-300';
            document.getElementById('btnInventario').className = pantalla === 'inventario' ? 'px-4 py-2 rounded bg-blue-600 text-sm font-bold' : 'px-4 py-2 rounded text-gray-300';
        }

        function actualizarInterfaz() {
            localStorage.setItem('inventarioTaller', JSON.stringify(inventario));
            const tabla = document.getElementById('tablaInventario');
            const select = document.getElementById('selectMaterial');
            tabla.innerHTML = '';
            select.innerHTML = '<option value="">Selecciona Material</option>';
            
            inventario.forEach((mat, i) => {
                tabla.innerHTML += `
                    <tr class="border-b">
                        <td class="p-3 font-bold">${mat.tipo}</td>
                        <td class="p-3 text-blue-600 font-black">${mat.peso} g</td>
                        <td class="p-3 space-x-2">
                            <button onclick="descontarMaterial(${i})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">- Consumo</button>
                            <button onclick="editarMaterial(${i})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">Editar</button>
                            <button onclick="eliminarMaterial(${i})" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Borrar</button>
                        </td>
                    </tr>`;
                select.innerHTML += `<option value="${mat.costo}">${mat.tipo} ($${mat.costo}/kg)</option>`;
            });
        }

        function descontarMaterial(i) {
            const consumo = prompt(`¿Cuántos gramos consumiste de ${inventario[i].tipo}?`);
            if (consumo && !isNaN(consumo)) {
                inventario[i].peso -= parseFloat(consumo);
                actualizarInterfaz();
            }
        }

        function agregarMaterial() {
            inventario.push({ tipo: document.getElementById('nuevoTipo').value, peso: parseFloat(document.getElementById('nuevoPeso').value), costo: parseFloat(document.getElementById('nuevoCosto').value) });
            actualizarInterfaz();
        }

        function editarMaterial(i) {
            const nuevoNombre = prompt("Nuevo nombre:", inventario[i].tipo);
            if(nuevoNombre) { inventario[i].tipo = nuevoNombre; actualizarInterfaz(); }
        }

        function eliminarMaterial(i) { if(confirm("¿Borrar?")) { inventario.splice(i, 1); actualizarInterfaz(); } }

        function calcularCosto() {
            const costoKg = parseFloat(document.getElementById('selectMaterial').value);
            const peso = parseFloat(document.getElementById('peso').value);
            const tiempo = parseFloat(document.getElementById('tiempo').value);
            const subtotal = ((peso/1000)*costoKg) + (tiempo*15) + 50;
            const total = document.getElementById('incluirIva').checked ? subtotal * 1.16 : subtotal;
            document.getElementById('precioVenta').innerText = "$" + Math.ceil(total) + ".00 MXN";
            document.getElementById('resultado').classList.remove('hidden');
        }

        actualizarInterfaz();
    </script>
</body>
</html>
